services:
  - type: web
    name: bams-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    disk:
      name: bams-data
      mountPath: /opt/render/project/src/database
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/database/banking_alerts.db

  - type: web
    name: bams-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: bams-backend
          envVarKey: RENDER_EXTERNAL_URL
